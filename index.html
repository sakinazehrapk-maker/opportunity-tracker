<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport"content="width=device-width, initial-scale=1.0">
    <title>opportunity tracker</title>
    <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>opportunity tracker</h1>
            <button id="themeToggle">Dark Mode</button>
            <div id="dashboard">
                <h2>dashboard</h2>
                <p id="total">total: 0</p>
                <p id="upcoming">upcoming:0</p>
                <p id="expired">expired:0</p>
                </div>
            <div id="analytics">
                <h2>analytics</h2>
                <p id="analyticsTotal">total:0</p>
                <p id="internshipCount">internships:0</p>
                <p id="scholarshipCount">scholarships:0</p>
                <p id="competitionCount">competitions:0</p>
                <p id="conferenceCount">Conferences:0</p>
            </div>
                <div id="chartContainer">
                <canvas id="categoryChart"></canvas>
            </div>
            <form id="opportunityForm">
            <input type="text" id="title" placeholder="opportunity title required">
            <select id="category">
                <option>competition</option>
                <option>internship</option>
                <option>scholarship</option>
                <option>conference</option>
            </select>
            <input type="text" id="organization" placeholder="organization">
            <input type="date" id="deadline" required>
            <input type="url" id="link" placeholder="opportunity link">
            <textarea id="notes" placeholder="notes"></textarea>
            <button type="submit">add opportunity</button>
        </form>
        <div class="controls">
            <input 
            type="text"
            id="searchInput"
            placeholder="search opportunities..."
            >
            <select id="filterCategory">
                <option value="all">all categories</option>
                <option value="competition">competition</option>
                <option value="internship">internship</option>
                <option value="scholarship">scholarship</option>
                <option value="conference">conference</option>
            </select>
            </div>
        <div id="opportunityList"></div>
        </div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
